version: '3.8'

services:
  # ------ Frontend Vue 3 + Nginx ------
  shopflow-frontend:
    image: nginx:alpine
    container_name: shopflow-frontend
    restart: always
    ports:
      # 【外界访问端口】：3000，映射给 Nginx 容器内的 80
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway-service
    networks:
      - shopflow-net

  # ------ Infrastructure ------
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: shopflow-nacos
    restart: always
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      # 限制一下 Nacos 内存，防止虚拟机内存太小引发 OOM 被系统枪毙
      - JVM_XMS=256m
      - JVM_XMX=256m
    networks:
      - shopflow-net

  mysql:
    image: mysql:8.0
    container_name: shopflow-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=SfDb_P@ss_2026
      - MYSQL_DATABASE=shopflow
    volumes:
      - ./database/shopflow-dump.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shopflow-net

  redis:
    image: redis:7.0-alpine
    container_name: shopflow-redis
    restart: always
    networks:
      - shopflow-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: shopflow-rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - shopflow-net

  # ------ Microservices ------
  gateway-service:
    image: shopflow/gateway-service
    container_name: shopflow-gateway
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - nacos
      - redis
    networks:
      - shopflow-net

  user-service:
    image: shopflow/user-service
    container_name: shopflow-user
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/shopflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=SfDb_P@ss_2026
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shopflow-net

  product-service:
    image: shopflow/product-service
    container_name: shopflow-product
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/shopflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=SfDb_P@ss_2026
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shopflow-net

  cart-service:
    image: shopflow/cart-service
    container_name: shopflow-cart
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - nacos
      - redis
    networks:
      - shopflow-net

  order-service:
    image: shopflow/order-service
    container_name: shopflow-order
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/shopflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=SfDb_P@ss_2026
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - nacos
      - mysql
      - redis
      - rabbitmq
    networks:
      - shopflow-net

  notification-service:
    image: shopflow/notification-service
    container_name: shopflow-notification
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/shopflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=SfDb_P@ss_2026
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - nacos
      - mysql
      - redis
      - rabbitmq
    networks:
      - shopflow-net

networks:
  shopflow-net:
    driver: bridge
