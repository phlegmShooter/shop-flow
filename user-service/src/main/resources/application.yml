# Spring Boot配置
server:
  port: 8081

spring:
  application:
    name: user-service

  # Nacos服务发现配置
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.4:8848
        enabled: true
        group: ECOMMERCE_GROUP
      config:
        server-addr: 192.168.1.4:8848
        enabled: true
        import-check:
          enabled: false

  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.1.4:3306/shopflow?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: SfDb_P@ss_2026

  # Redis配置
  data:
    redis:
      host: 192.168.1.4
      port: 6379
      database: 1
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # JPA配置（可选，用于MyBatis Plus）
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1        # 逻辑已删除值
      logic-not-delete-value: 0    # 逻辑未删除值

# JWT配置
jwt:
  secret: shopflow-secret-key-2026-03-25-electronic-commerce
  expiration: 604800  # 7天，单位秒
  token-header: Authorization
  token-prefix: "Bearer "

# 日志配置
logging:
  level:
    com.shopflow.user: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log

# 接口文档配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha