spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.4:8848
        namespace: public
        group: ECOMMERCE_GROUP
      config:
        server-addr: 192.168.1.4:8848
        namespace: public
        group: ECOMMERCE_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: shopflow-common.yaml
            group: ECOMMERCE_GROUP
            refresh: true

server:
  port: 8080
